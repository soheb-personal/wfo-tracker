spring:
  application:
    name: wfotracker
  datasource:
    url: jdbc:mysql://localhost:33306/wfotracker
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  level:
    com.wfotracker: DEBUG
    org.springframework.security: INFO
