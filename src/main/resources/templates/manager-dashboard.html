<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manager Dashboard')}">
    <title>Manager Dashboard - WFO Tracker</title>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>My Team - Compliance Dashboard</h2>
        <a th:href="@{/manager/employee/add}" class="btn btn-primary">Add Employee</a>
    </div>

    <form method="get" class="row g-3 mb-4 align-items-end">
        <div class="col-auto">
            <label for="month" class="form-label">Month</label>
            <select name="month" id="month" class="form-select">
                <option th:each="m : ${#numbers.sequence(1, 12)}" th:value="${m}" th:text="${m}" th:selected="${m == currentMonth}"></option>
            </select>
        </div>
        <div class="col-auto">
            <label for="year" class="form-label">Year</label>
            <input type="number" name="year" id="year" class="form-control" th:value="${currentYear}" required min="2000" max="2100">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-secondary">Filter</button>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Employee Name</th>
                    <th>Status</th>
                    <th>Req. Days</th>
                    <th>Visited</th>
                    <th>Remaining</th>
                    <th>Compliance %</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="emp : ${employeesCompliance}">
                    <td th:text="${emp.employeeName} + ' (' + ${emp.username} + ')'"></td>
                    <td>
                        <span th:if="${emp.active}" class="badge bg-success">Active</span>
                        <span th:unless="${emp.active}" class="badge bg-danger">Deactivated</span>
                    </td>
                    <td th:text="${emp.requiredOfficeDays}"></td>
                    <td>
                        <span th:text="${emp.actualOfficeDaysVisited}"></span>
                        <div th:if="${emp.manualCheckins > 0}" class="text-muted" style="font-size: 0.8rem;" th:text="'+ ' + ${emp.manualCheckins} + ' Manual'"></div>
                    </td>
                    <td th:text="${emp.remainingOfficeDays}"></td>
                    <td>
                        <div class="progress">
                            <progress class="progress-bar" max="100"
                                 th:value="${emp.compliancePercentage}"
                                 th:classappend="${emp.compliancePercentage >= 100} ? 'bg-success' : (${emp.compliancePercentage >= 50} ? 'bg-warning' : 'bg-danger')"
                                 th:text="${emp.compliancePercentage} + '%'"></progress>
                        </div>
                    </td>
                    <td>
                        <div class="d-flex gap-1 flex-wrap">
                            <a th:href="@{/manager/employee/edit/{id}(id=${emp.employeeId})}" class="btn btn-sm btn-outline-primary" th:if="${emp.active}">Edit</a>
                            
                            <a th:href="@{/manager/employee/configure/{id}(id=${emp.employeeId}, month=${currentMonth}, year=${currentYear})}" class="btn btn-sm btn-outline-info" th:if="${emp.active}">Config</a>

                            <form th:action="@{/manager/employee/reset-password/{id}(id=${emp.employeeId})}" method="post" th:if="${emp.active}">
                                <button type="submit" class="btn btn-sm btn-outline-warning" onclick="return confirm('Reset employee password to default?')">Reset Pwd</button>
                            </form>

                            <form th:action="@{/manager/employee/deactivate/{id}(id=${emp.employeeId})}" method="post" th:if="${emp.active}">
                                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Deactivate employee?')">Deactivate</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(employeesCompliance)}">
                    <td colspan="7" class="text-center">No employees found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
