<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Add Employee')}">
    <title>Add Employee - WFO Tracker</title>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Add New Employee</h4>
                </div>
                <div class="card-body">
                    <div th:replace="~{fragments/layout :: alerts}"></div>
                    <form th:action="@{/manager/employee/add}" th:object="${addEmployeeRequest}" method="post">
                        
                        <div class="mb-3">
                            <label for="employeeName" class="form-label">Employee Full Name</label>
                            <input type="text" class="form-control" id="employeeName" th:field="*{employeeName}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('employeeName')}" th:errors="*{employeeName}"></div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/manager/dashboard}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Add Employee</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
