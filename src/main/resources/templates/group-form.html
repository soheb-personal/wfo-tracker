<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Create Team Group')}">
    <title>Create Team Group - WFO Tracker</title>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Create New Group</h4>
                </div>
                <div class="card-body">
                    <div th:replace="~{fragments/layout :: alerts}"></div>
                    
                    <form th:action="@{/manager/group/create}" method="post">
                        <div class="mb-3">
                            <label for="groupName" class="form-label">Group Name</label>
                            <input type="text" class="form-control" id="groupName" name="groupName" th:value="${groupName}" required max="100" autocomplete="off" placeholder="e.g. Sub-Team A">
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/manager/group/list}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Create Group</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
