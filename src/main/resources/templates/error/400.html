<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>400 - Bad Request - WFO Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5 text-center" style="max-width: 600px; margin-top: 10vh;">
    <div class="card shadow-sm border-0 p-4">
        <h1 class="display-1 text-warning fw-bold">400</h1>
        <h2 class="h4 text-dark mb-3">Bad Request</h2>
        <p class="text-secondary" th:text="${error}">The request parameters or arguments provided are invalid.</p>
        <div class="mt-4">
            <a href="/login" class="btn btn-primary px-4">Back to Login</a>
        </div>
    </div>
</div>
</body>
</html>
