<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Edit Employee')}">
    <title>Edit Employee - WFO Tracker</title>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Edit Employee</h4>
                </div>
                <div class="card-body">
                    <div th:replace="~{fragments/layout :: alerts}"></div>
                    <form th:action="@{/manager/employee/edit/{id}(id=${employeeId})}" th:object="${editEmployeeRequest}" method="post">
                        
                        <div class="mb-3">
                            <label for="employeeName" class="form-label">Employee Full Name</label>
                            <input type="text" class="form-control" id="employeeName" th:field="*{employeeName}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('employeeName')}" th:errors="*{employeeName}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label">Employee DAS ID</label>
                            <input type="text" class="form-control" id="username" th:field="*{username}" required maxlength="10">
                            <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="groupId" class="form-label">Team Group (Optional)</label>
                            <select class="form-select" id="groupId" th:field="*{groupId}">
                                <option value="">None (DEFAULT)</option>
                                <option th:each="g : ${groups}" th:value="${g.id}" th:text="${g.groupName}"></option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/manager/dashboard}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Update Employee</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
