<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WFO Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4 fw-bold text-primary">WFO Tracker</h3>
                    
                    <div th:if="${param.error}" class="alert alert-danger" role="alert">
                        <span th:if="${param.error[0] == 'deactivated'}">
                            Your account has been deactivated. Please contact your system administrator.
                        </span>
                        <span th:unless="${param.error[0] == 'deactivated'}">
                            Invalid Username, password, or selected role.
                        </span>
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success" role="alert">
                        You have been logged out.
                    </div>
                    <div th:if="${param.passwordChanged}" class="alert alert-success" role="alert">
                        Password changed successfully. Please log in again.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="role" class="form-label fw-semibold">Login As</label>
                            <select class="form-select" id="role" name="role" required>
                                <option value="" disabled selected>-- Select Role --</option>
                                <option value="ROLE_ADMIN">Admin</option>
                                <option value="ROLE_MANAGER">Manager</option>
                                <option value="ROLE_EMPLOYEE">Employee</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Username</label>
                            <input type="text" class="form-control" id="username" name="username" placeholder="Enter your Username" required autofocus autocomplete="username">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary fw-semibold py-2">Login</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
