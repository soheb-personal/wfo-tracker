<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Edit Team')}">
    <title>Edit Team - WFO Tracker</title>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Edit Team</h4>
                </div>
                <div class="card-body">
                    <div th:replace="~{fragments/layout :: alerts}"></div>
                    <form th:action="@{/admin/team/edit/{id}(id=${teamId})}" th:object="${editTeamRequest}" method="post">
                        
                        <div class="mb-3">
                            <label for="teamName" class="form-label">Team Name</label>
                            <input type="text" class="form-control" id="teamName" th:field="*{teamName}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('teamName')}" th:errors="*{teamName}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="managerName" class="form-label">Manager Full Name</label>
                            <input type="text" class="form-control" id="managerName" th:field="*{managerName}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('managerName')}" th:errors="*{managerName}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="managerUsername" class="form-label">Manager DAS ID</label>
                            <input type="text" class="form-control" id="managerUsername" th:field="*{managerUsername}" required maxlength="10">
                            <div class="text-danger" th:if="${#fields.hasErrors('managerUsername')}" th:errors="*{managerUsername}"></div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Update Team</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
