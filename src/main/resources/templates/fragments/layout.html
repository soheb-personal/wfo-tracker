<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">WFO Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <style>
        body { padding-top: 60px; }
        .progress { height: 20px; }
        progress.progress-bar {
            appearance: none;
            -webkit-appearance: none;
            border: none;
            height: 100%;
            width: 100%;
            background-color: transparent;
        }
        progress.progress-bar::-webkit-progress-bar {
            background-color: transparent;
        }
        progress.progress-bar::-webkit-progress-value {
            border-radius: 0.375rem;
            transition: width 0.6s ease;
        }
        progress.progress-bar::-moz-progress-bar {
            border-radius: 0.375rem;
            transition: padding-bottom 0.6s ease;
        }
        progress.progress-bar.bg-success::-webkit-progress-value {
            background-color: var(--bs-success, #198754);
        }
        progress.progress-bar.bg-success::-moz-progress-bar {
            background-color: var(--bs-success, #198754);
        }
        progress.progress-bar.bg-warning::-webkit-progress-value {
            background-color: var(--bs-warning, #ffc107);
        }
        progress.progress-bar.bg-warning::-moz-progress-bar {
            background-color: var(--bs-warning, #ffc107);
        }
        progress.progress-bar.bg-danger::-webkit-progress-value {
            background-color: var(--bs-danger, #dc3545);
        }
        progress.progress-bar.bg-danger::-moz-progress-bar {
            background-color: var(--bs-danger, #dc3545);
        }
    </style>
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">WFO Tracker</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:classappend="${activeTab == 'dashboard' ? 'active' : ''}" th:href="@{/admin/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('MANAGER')">
                    <a class="nav-link" th:classappend="${activeTab == 'dashboard' ? 'active' : ''}" th:href="@{/manager/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('MANAGER')">
                    <a class="nav-link" th:classappend="${activeTab == 'employees' ? 'active' : ''}" th:href="@{/manager/employee/list}">Employees</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('MANAGER')">
                    <a class="nav-link" th:classappend="${activeTab == 'groups' ? 'active' : ''}" th:href="@{/manager/group/list}">Groups</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYEE')">
                    <a class="nav-link" th:classappend="${activeTab == 'dashboard' ? 'active' : ''}" th:href="@{/employee/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYEE')">
                    <a class="nav-link" th:classappend="${activeTab == 'history' ? 'active' : ''}" th:href="@{/employee/history}">History</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <span class="nav-link text-light" sec:authentication="name"></span>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-link nav-link">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div th:fragment="alerts" class="mt-3">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>
<script th:fragment="scripts" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
